<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Gyeongsangbuk-do Emblem Symbol -->
  <g transform="translate(60,60)" filter="url(#shadow)">
    <!-- Red Curve (Sun / Passion) -->
    <path d="M -12,-48 C 20,-52 50,-28 42,0 C 30,-18 8,-32 -12,-48 Z" fill="#eb3b5a"/>
    <!-- Yellow / Gold Curve (Rich Fields) -->
    <path d="M 48,-12 C 52,20 28,50 0,42 C 18,30 32,8 48,-12 Z" fill="#fa8231"/>
    <!-- Green Curve (Clean Agriculture & Forest) -->
    <path d="M 12,48 C -20,52 -50,28 -42,0 C -30,18 -8,32 12,48 Z" fill="#20bf6b"/>
    <!-- Blue Curve (East Sea & Rivers) -->
    <path d="M -48,12 C -52,-20 -28,-50 0,-42 C -18,-30 -32,-8 -48,12 Z" fill="#2d98da"/>
    <!-- Center Emblem Ring & White Crane Accent -->
    <circle cx="0" cy="0" r="14" fill="#ffffff"/>
    <circle cx="0" cy="0" r="10" fill="#052018"/>
    <path d="M 0,-11 L 3.5,-3.5 L 11,0 L 3.5,3.5 L 0,11 L -3.5,3.5 L -11,0 L -3.5,-3.5 Z" fill="#20bf6b"/>
  </g>
</svg>
